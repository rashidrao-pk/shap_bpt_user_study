<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank you</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f4f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      max-width: 480px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
    }
    p {
      color: #4b5563;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>Thank you!</h1>
  <p>Your rankings have been recorded.</p>
  <p>You may now close this window.</p>
</div>
</body>
</html>
